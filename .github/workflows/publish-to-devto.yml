name: Publish new posts to dev.to

on:
  push:
    branches: [main]
    paths:
      - '_posts/*.md'
  workflow_dispatch:
    inputs:
      file:
        description: 'Path to a specific post to (re-)publish, e.g. _posts/2026-07-03-go-iter-yield.md'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install dependencies
        run: pip install PyYAML requests --quiet

      - name: Publish specific post
        if: github.event_name == 'workflow_dispatch'
        env:
          DEVTO_TOKEN: ${{ secrets.DEVTO_TOKEN }}
        run: python scripts/publish_to_devto.py "${{ inputs.file }}"

      - name: Publish new posts
        if: github.event_name == 'push'
        env:
          DEVTO_TOKEN: ${{ secrets.DEVTO_TOKEN }}
        run: |
          git diff --name-only --diff-filter=A HEAD~1 HEAD -- '_posts/*.md' \
            | grep -v 'CLAUDE.md' \
            | while read file; do
                echo "Publishing $file..."
                python scripts/publish_to_devto.py "$file"
              done
